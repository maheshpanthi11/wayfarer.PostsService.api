apiVersion: apps/v1
kind: Deployment
metadata:
  name: wayfarer-posts-service
  namespace: wayfarer
  labels:
    app: wayfarer-posts-service
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: wayfarer-posts-service
  template:
    metadata:
      labels:
        app: wayfarer-posts-service
    spec:
      initContainers:
      - name: wait-for-postgres
        image: postgres:15-alpine
        imagePullPolicy: IfNotPresent
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: PGUSER
          valueFrom:
            configMapKeyRef:
              name: wayfarer-posts-config
              key: DB_USER
        - name: PGHOST
          valueFrom:
            configMapKeyRef:
              name: wayfarer-posts-config
              key: DB_HOST
        - name: PGPORT
          valueFrom:
            configMapKeyRef:
              name: wayfarer-posts-config
              key: DB_PORT
        command:
        - sh
        - -c
        - |
          echo "waiting for postgres at ${PGHOST}:${PGPORT}..."
          until pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}"; do
            sleep 2
          done
      containers:
      - name: wayfarer-posts-service
        image: maheshpanthi079/wayfarer-posts-service:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: https
          containerPort: 8081
          protocol: TCP
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: wayfarer-posts-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: wayfarer-posts-config
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: wayfarer-posts-config
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: wayfarer-posts-config
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: ConnectionStrings__DefaultConnection
          value: "Server=$(DB_HOST);Port=$(DB_PORT);Database=$(DB_NAME);Uid=$(DB_USER);Pwd=$(DB_PASSWORD);"
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
