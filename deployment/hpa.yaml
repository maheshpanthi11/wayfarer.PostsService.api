apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wayfarer-posts-hpa
  namespace: wayfarer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wayfarer-posts-service
  minReplicas: 4
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 30  # 30-second cool down before scaling down
      policies:
      - type: Percent
        value: 100                    # Allows scaling down up to 100% of pods
        periodSeconds: 15   