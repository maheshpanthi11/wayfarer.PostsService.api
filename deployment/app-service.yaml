apiVersion: v1
kind: Service
metadata:
  name: wayfarer-posts-service
  namespace: wayfarer
  labels:
    app: wayfarer-posts-service
spec:
  type: NodePort
  selector:
    app: wayfarer-posts-service
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
  - name: https
    protocol: TCP
    port: 443
    targetPort: 8081
