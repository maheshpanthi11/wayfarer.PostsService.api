# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore ./src/wayfarer.PostsService.api.slnx
    - name: Build
      run: dotnet build ./src/wayfarer.PostsService.api.slnx --no-restore
    - name: Test
      run: dotnet test ./src/wayfarer.PostsService.api.slnx --no-build --verbosity normal

  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Fetch your repository source code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up Buildx for advanced features like caching
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. Authenticate against your Docker Hub account
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 4. Build the image locally and push it to the registry
    - name: Build and Push
      uses: docker/build-push-action@v6
      with:
        context: ./src/wayfarer.PostsService.api
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/wayfarer-posts-service:latest,${{ secrets.DOCKERHUB_USERNAME }}/wayfarer-posts-service:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

