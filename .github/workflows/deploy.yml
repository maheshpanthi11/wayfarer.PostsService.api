name: Wayfarer PostsService CD

# Trigger this CD workflow only after the CI workflow completes successfully
on:
  workflow_run:
    workflows: ["Wayfarer PostsService CI"]
    types:
      - completed

jobs:
  deployment:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up gcloud SDK and install GKE auth plugin
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GKE_SA_KEY }}
          export_default_credentials: true
          components: gke-gcloud-auth-plugin

      - name: Enable GKE auth plugin for kubectl
        run: |
          gcloud config set auth/use_gke_gcloud_auth_plugin true

      - name: Configure kubectl
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_NAME }} \
            --zone ${{ secrets.GKE_ZONE }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to GKE using image from CI
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Update deployment image to the image pushed by CI (tagged with commit sha)
          kubectl set image deployment/wayfarer-posts-service \
            wayfarer-posts-service=${DOCKERHUB_USER}/wayfarer-posts-service:${IMAGE_TAG} --record
          kubectl rollout status deployment/wayfarer-posts-service -n default --timeout=5m

      - name: Verify Deployment
        run: |
          echo "Deployment completed"
          kubectl get all -n default
