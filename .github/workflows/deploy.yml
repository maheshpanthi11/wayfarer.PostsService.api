name: Wayfarer PostsService CD

# Trigger this CD workflow only after the CI workflow completes successfully
on:
  workflow_run:
    workflows: ["Wayfarer PostsService CI"]
    types:
      - completed

jobs:
  deployment:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (service account)
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - name: Set up gcloud SDK and install GKE auth plugin
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GKE_SA_KEY }}
          export_default_credentials: true
          components: gke-gcloud-auth-plugin

      - name: Ensure GKE auth plugin installed and enable it for kubectl
        run: |
          # try installing the component (may be unnecessary on some runners)
          gcloud --quiet components install gke-gcloud-auth-plugin || true
          # some images provide the plugin as a package; try fallbacks (ignore failures)
          command -v gke-gcloud-auth-plugin >/dev/null 2>&1 || true
          # enable the plugin for kubectl auth; tolerate if unsupported
          gcloud config set auth/use_gke_gcloud_auth_plugin true || true

      - name: Authenticate service account for gcloud (explicit)
        env:
          GKE_SA_KEY: ${{ secrets.GKE_SA_KEY }}
        run: |
          # write service account key to file and activate it
          printf '%s' "${GKE_SA_KEY}" > sa-key.json
          gcloud auth activate-service-account --key-file=sa-key.json
          # show active account
          gcloud auth list --filter=status:ACTIVE --format="value(account)"

      - name: Configure kubectl
        run: |
          # ensure project is set and credentials are active
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
          gcloud auth list --filter=status:ACTIVE --format="value(account)"
          gcloud auth print-access-token >/dev/null
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_NAME }} \
            --zone ${{ secrets.GKE_ZONE }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Ensure `wayfarer` namespace exists
        run: |
          kubectl create namespace wayfarer --dry-run=client -o yaml | kubectl apply -f -

      - name: Create DB secret from GitHub Secrets (idempotent)
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        run: |
          kubectl create secret generic postgres-secret --namespace wayfarer \
            --from-literal=POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
            --from-literal=POSTGRES_USER="${POSTGRES_USER}" \
            --from-literal=POSTGRES_DB="${POSTGRES_DB}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to GKE using image from CI
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Update deployment image to the image pushed by CI (tagged with commit sha)
          DEPLOY=wayfarer-posts-service
          NAMESPACE=wayfarer
          IMAGE=${DOCKERHUB_USER}/wayfarer-posts-service:${IMAGE_TAG}

          kubectl apply -f deployment/
          kubectl set image deployment/${DEPLOY} \
            wayfarer-posts-service=${IMAGE} -n ${NAMESPACE}
          kubectl rollout status deployment/${DEPLOY} -n ${NAMESPACE} --timeout=5m

      - name: Verify Deployment
        run: |
          echo "Deployment completed"
          kubectl get all -n wayfarer
